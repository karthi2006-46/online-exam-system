# Server Configuration
server.port=8080
server.servlet.context-path=/

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/online_exam_lms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Karthi@2006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging
logging.level.root=INFO
logging.level.com.lms=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=onlineexamlearningmanagementsystemsecretkeyfor256bitencryption2024
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Application Configuration
spring.application.name=Online Exam LMS
spring.profiles.active=dev

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# Session Configuration
server.servlet.session.timeout=30m

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
